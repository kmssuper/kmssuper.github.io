<!DOCTYPE html>
<html>
<head>
	<title>My Website</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			margin: 0;
			padding: 0;
		}

		.container {
			max-width: 1200px;
			margin: 0 auto;
			padding: 20px;
		}

		nav {
			background-color: #333;
			color: #fff;
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 10px;
			position: sticky;
			top: 0;
			z-index: 1;
		}

		nav a {
			color: #fff;
			text-decoration: none;
			padding: 10px;
			transition: all 0.3s ease;
		}

		nav a:hover {
			background-color: #fff;
			color: #333;
			border-radius: 5px;
		}

		nav .active {
			background-color: #fff;
			color: #333;
			border-radius: 5px;
		}

		h1 {
			text-align: center;
			margin-top: 50px;
		}

		.info {
			display: flex;
			flex-wrap: wrap;
			justify-content: space-between;
			margin-top: 20px;
		}

		.info-box {
			background-color: #fff;
			margin-bottom: 20px;
			padding: 10px;
			width: calc(33.33% - 20px);
			box-shadow: 0 0 10px rgba(0,0,0,0.1);
			transition: all 0.3s ease;
			border-radius: 5px;
		}

		.info-box:hover {
			transform: translateY(-10px);
			box-shadow: 0 15px 30px rgba(0,0,0,0.2);
		}

		.info-box img {
			width: 100%;
			height: auto;
			transition: all 0.3s ease;
			border-radius: 5px;
		}

		.info-box:hover img {
			transform: scale(1.05);
		}

		.info-box h2 {
			font-size: 20px;
			margin: 10px 0;
			transition: all 0.3s ease;
			text-align: center;
		}

		.info-box:hover h2 {
			font-size: 24px;
		}

		.info-box p {
			font-size: 14px;
			margin: 10px 0;
			text-align: justify;
			line-height: 1.5;
			height: 100px;
			overflow: hidden;
		}

		.info-box .btn {
			display: block;
			background-color: #333;
			color: #fff;
			padding: 10px;
			text-align: center;
			border-radius: 5px;
			margin: 10px 0;
			transition: all 0.3s ease;
			text-decoration: none;
		}

		.info-box .btn:hover {
			background-color: #fff;
			color: #333;
			box-shadow: 0 0 10px rgba(0,0,0,0.3);
		}

		form {
			display: flex;
			flex-direction: column;
			align-items: center;
			margin-top: 50px
				<div class="form-group">
					<label for="email">Email address:</label>
					<input type="email" class="form-control" id="email" name="email" required>
				</div>
				<div class="form-group">
					<label for="password">Password:</label>
					<input type="password" class="form-control" id="password" name="password" required>
				</div>
				<button type="submit" class="btn btn-primary">Log In</button>
			</form>
		</div>
	</div>

	<!-- Info section -->

</body>
